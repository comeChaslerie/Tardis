name: CI

env:
  MIRROR_SSH_URL: "git@github.com:EpitechPGE1-2025/G-AIA-210-NAN-2-1-tardis-3.git"

on:
  push:
    branches-ignore:
      - no-ga/**
  pull_request:

jobs:

  check_repository:
    if: >-
      !(github.event_name == 'pull_request'
      && startsWith(github.head_ref, 'no-ga/'))
    runs-on: ubuntu-latest
    outputs:
      is_mirror: ${{ steps.check.outputs.is_mirror }}
    steps:

      - name: check if repository is mirror
        id: check
        run: |
          MIRROR_REPO=$(echo "$MIRROR_SSH_URL" | sed 's/.*://;s/\.git$//')
          if [ "$MIRROR_REPO" = "${{ github.repository }}" ]; then
            echo "is_mirror=true" >> $GITHUB_OUTPUT
          else
            echo "is_mirror=false" >> $GITHUB_OUTPUT
          fi

  push_to_mirror:
    needs: check_repository
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:

      - name: checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Mirroring Repository
        uses: pixta-dev/repository-mirroring-action@v1.1.1
        with:
          target_repo_url:
            ${{ env.MIRROR_SSH_URL }}
          ssh_private_key:
            ${{ secrets.GIT_SSH_PRIVATE_KEY }}
